<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Liminal Horror</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Courier, monospace; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f00; text-align: center; pointer-events: none; }
        canvas { display: block; }
        #instructions { color: #888; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="msg">НАЖМИ, ЧТОБЫ ВОЙТИ В ПУСТОТУ</h1>
        <div id="instructions">WASD - Движение | Мышь - Обзор</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        let scene, camera, renderer, controls, player;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.15); // Густой туман для атмосферы

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Свет фонарика
            const light = new THREE.PointLight(0xffffff, 1, 10);
            camera.add(light);
            scene.add(camera);

            // Пол и стены (процедурная генерация лабиринта)
            const geo = new THREE.BoxGeometry(1, 3, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0x444433 });

            for (let i = 0; i < 150; i++) {
                const wall = new THREE.Mesh(geo, mat);
                wall.position.x = Math.floor(Math.random() * 20) - 10;
                wall.position.z = Math.floor(Math.random() * 20) - 10;
                wall.position.y = 1.5;
                scene.add(wall);
            }

            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Отключаем сглаживание для скорости
            renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1 : window.devicePixelRatio); // Для слабых ПК
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Управление
            document.addEventListener('mousedown', () => {
                document.body.requestPointerLock();
                document.getElementById('ui').style.opacity = 0;
            });

            const onKeyDown = (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
            };
            const onKeyUp = (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(-velocity.z * delta);
            camera.position.y = 1.6 + Math.sin(time * 0.01) * 0.02; // Эффект покачивания головы

            // Простенький скример-эффект: если долго ходить, экран мигает
            if (Math.random() > 0.998) {
                scene.background = new THREE.Color(0x220000);
                setTimeout(() => scene.background = new THREE.Color(0x050505), 50);
            }

            renderer.render(scene, camera);
            prevTime = time;
        }
    </script>
</body>
</html>
