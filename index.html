<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Night Hunter</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
body { margin:0; background:black; }
</style>
</head>
<body>

<script>
// ================= CONFIG =================
const config = {
    type: Phaser.AUTO,
    width: 1000,
    height: 600,
    physics: { default:'arcade', arcade:{debug:false}},
    scene: { preload, create, update }
};

new Phaser.Game(config);

// ================= GLOBAL =================
let player, bots = [], walls = [];
let keys;
let state = "menu";
let stamina = 100;
let noise = 0;
let startTime = 0;
let ui;

// ================= PRELOAD =================
function preload() {}

// ================= CREATE =================
function create() {

    keys = this.input.keyboard.addKeys({
        W:'W',A:'A',S:'S',D:'D',
        SHIFT:'SHIFT', SPACE:'SPACE'
    });

    ui = this.add.text(350,250,"NIGHT HUNTER\n\nSPACE START",
    {font:"28px Arial",fill:"#fff",align:"center"});
}

// ================= START GAME =================
function startGame(scene){
    state = "play";
    ui.destroy();

    player = scene.physics.add.rectangle(100,100,25,25,0x00ffff);
    player.body.setCollideWorldBounds(true);

    // walls
    for(let i=0;i<10;i++){
        let w = scene.add.rectangle(
            Phaser.Math.Between(100,900),
            Phaser.Math.Between(100,500),
            Phaser.Math.Between(120,220),
            20,
            0x444444
        );
        scene.physics.add.existing(w,true);
        walls.push(w);
    }

    scene.physics.add.collider(player,walls);

    // bots
    for(let i=0;i<4;i++){
        let b = scene.physics.add.rectangle(
            Phaser.Math.Between(400,900),
            Phaser.Math.Between(200,500),
            25,25,0xff0000
        );
        b.state="patrol";
        b.memory=0;
        bots.push(b);
        scene.physics.add.collider(b,walls);
    }

    ui = scene.add.text(10,10,"",{font:"16px Arial",fill:"#fff"});
    startTime = scene.time.now;
}

// ================= UPDATE =================
function update(time){

    if(state==="menu"){
        if(keys.SPACE.isDown) startGame(this);
        return;
    }

    // player
    let speed = 150;
    if(keys.SHIFT.isDown && stamina>0){
        speed = 260;
        stamina -= 0.5;
        noise = 120;
    } else {
        stamina += 0.3;
        noise *= 0.9;
    }

    stamina = Phaser.Math.Clamp(stamina,0,100);

    player.body.setVelocity(0);

    if(keys.A.isDown) player.body.setVelocityX(-speed);
    if(keys.D.isDown) player.body.setVelocityX(speed);
    if(keys.W.isDown) player.body.setVelocityY(-speed);
    if(keys.S.isDown) player.body.setVelocityY(speed);

    // bots
    bots.forEach(b=>{
        let dx = player.x - b.x;
        let dy = player.y - b.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        let see = dist<200;

        if(see){
            b.state="chase";
            b.memory=time;
        }
        else if(time-b.memory<3000){
            b.state="search";
        }
        else{
            b.state="patrol";
        }

        if(b.state==="chase"){
            b.body.setVelocity(dx*2.5,dy*2.5);
        }
        else if(b.state==="search"){
            b.body.setVelocity(dx*1.2,dy*1.2);
        }
        else{
            if(!b.move || time>b.move){
                b.body.setVelocity(
                    Phaser.Math.Between(-80,80),
                    Phaser.Math.Between(-80,80)
                );
                b.move=time+2000;
            }
        }

        if(dist<20){
            state="end";
            ui.setText("💀 ПОЙМАН\nF5");
        }
    });

    if(time-startTime>30000){
        state="end";
        ui.setText("🏆 ВЫЖИЛ\nF5");
    }

    ui.setText(
        "Time: "+Math.floor((time-startTime)/1000)+
        "\nStamina: "+Math.floor(stamina)
    );
}
</script>

</body>
</html>
