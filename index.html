<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OVERKILL GAME</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>body{margin:0;background:black;}</style>
</head>
<body>

<script>

// ================= CONFIG =================
const config = {
    type: Phaser.AUTO,
    width: 1100,
    height: 650,
    physics: { default:'arcade', arcade:{debug:false}},
    scene: { create, update }
};

new Phaser.Game(config);

// ================= GLOBAL =================
let player;
let bots = [];
let walls = [];
let items = [];
let ui;

let keys;
let gameState = "menu";

let stamina = 100;
let health = 100;
let fear = 0;
let noise = 0;

let startTime = 0;

// ================= CREATE =================
function create(){

    keys = this.input.keyboard.addKeys({
        W:'W',A:'A',S:'S',D:'D',
        SHIFT:'SHIFT', SPACE:'SPACE'
    });

    ui = this.add.text(400,250,
        "OVERKILL GAME\n\nPRESS SPACE",
        {font:"28px Arial",fill:"#fff"}
    );

    this.input.keyboard.on("keydown-SPACE",()=>{
        if(gameState==="menu"){
            startGame(this);
        }
    });
}

// ================= START =================
function startGame(scene){

    gameState = "play";
    ui.destroy();

    // PLAYER
    player = scene.physics.add.rectangle(100,100,25,25,0x00ffff);
    player.body.setCollideWorldBounds(true);

    // WALLS
    for(let i=0;i<25;i++){
        createWall(scene,
            Phaser.Math.Between(50,1050),
            Phaser.Math.Between(50,600),
            Phaser.Math.Between(100,300),
            20
        );
    }

    scene.physics.add.collider(player,walls);

    // ITEMS (для прикола добавим)
    for(let i=0;i<10;i++){
        let item = scene.add.rectangle(
            Phaser.Math.Between(100,1000),
            Phaser.Math.Between(100,600),
            15,15,0xffff00
        );
        scene.physics.add.existing(item,true);
        items.push(item);
    }

    // BOTS
    for(let i=0;i<8;i++){
        let bot = scene.physics.add.rectangle(
            Phaser.Math.Between(300,1000),
            Phaser.Math.Between(200,600),
            25,25,0xff0000
        );

        bot.state="patrol";
        bot.memory=0;
        bot.speed=Phaser.Math.Between(80,120);

        bots.push(bot);

        scene.physics.add.collider(bot,walls);
    }

    ui = scene.add.text(10,10,"",{font:"16px Arial",fill:"#fff"});
    startTime = scene.time.now;
}

// ================= UPDATE =================
function update(time){

    if(gameState!=="play") return;

    // ===== PLAYER =====
    let speed = 150;

    if(keys.SHIFT.isDown && stamina>0){
        speed = 300;
        stamina -= 0.6;
        noise = 150;
    } else {
        stamina += 0.4;
        noise *= 0.9;
    }

    stamina = Phaser.Math.Clamp(stamina,0,100);

    player.body.setVelocity(0);

    if(keys.A.isDown) player.body.setVelocityX(-speed);
    if(keys.D.isDown) player.body.setVelocityX(speed);
    if(keys.W.isDown) player.body.setVelocityY(-speed);
    if(keys.S.isDown) player.body.setVelocityY(speed);

    // ===== ITEMS =====
    items.forEach((item,i)=>{
        let dist = Phaser.Math.Distance.Between(
            player.x,player.y,item.x,item.y
        );

        if(dist<20){
            item.destroy();
            items.splice(i,1);
            stamina += 10;
            health += 5;
        }
    });

    // ===== BOTS AI =====
    bots.forEach(bot=>{

        let dx = player.x - bot.x;
        let dy = player.y - bot.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        let see = dist<220;
        let hear = dist<noise;

        if(see){
            bot.state="chase";
            bot.memory=time;
        }
        else if(hear){
            bot.state="search";
            bot.memory=time;
        }
        else if(time-bot.memory<4000){
            bot.state="search";
        }
        else{
            bot.state="patrol";
        }

        if(bot.state==="chase"){
            bot.body.setVelocity(dx*2.5,dy*2.5);
            fear += 0.3;
        }
        else if(bot.state==="search"){
            bot.body.setVelocity(dx*1.2,dy*1.2);
        }
        else{
            if(!bot.move || time>bot.move){
                bot.body.setVelocity(
                    Phaser.Math.Between(-bot.speed,bot.speed),
                    Phaser.Math.Between(-bot.speed,bot.speed)
                );
                bot.move=time+2000;
            }
        }

        if(dist<20){
            health -= 1;
        }
    });

    // ===== STATUS =====
    stamina = Phaser.Math.Clamp(stamina,0,100);
    health = Phaser.Math.Clamp(health,0,100);
    fear = Phaser.Math.Clamp(fear,0,100);

    // ===== EFFECTS =====
    if(fear>60){
        player.fillColor = 0xffaaaa;
    } else {
        player.fillColor = 0x00ffff;
    }

    // ===== LOSE =====
    if(health<=0){
        gameState="end";
        ui.setText("💀 DEAD\nF5");
    }

    // ===== WIN =====
    if(time-startTime>60000){
        gameState="end";
        ui.setText("🏆 WIN\nF5");
    }

    // ===== UI =====
    ui.setText(
        "Time: "+Math.floor((time-startTime)/1000)+
        "\nHP: "+Math.floor(health)+
        "\nStamina: "+Math.floor(stamina)+
        "\nFear: "+Math.floor(fear)+
        "\nItems: "+items.length
    );
}

// ================= HELPERS =================
function createWall(scene,x,y,w,h){
    let wall = scene.add.rectangle(x,y,w,h,0x333333);
    scene.physics.add.existing(wall,true);
    walls.push(wall);
}

</script>

</body>
</html>
