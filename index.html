<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASSETN: GRANNY - REBORN ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        #ui-root { position: absolute; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .screen { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; pointer-events: all; transition: 0.5s;
        }
        .screen.hidden { opacity: 0; pointer-events: none; }

        h1 { font-size: 120px; color: #600; margin: 0; letter-spacing: 30px; font-weight: 900; filter: drop-shadow(0 0 10px #f00); }
        .btn {
            background: none; border: 2px solid #600; color: #600; padding: 20px 60px;
            font-size: 24px; cursor: pointer; transition: 0.3s; letter-spacing: 5px; margin: 10px;
        }
        .btn:hover { background: #600; color: #fff; box-shadow: 0 0 50px rgba(255,0,0,0.5); }

        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #fff; border-radius: 50%; opacity: 0.5; }
        
        .status-panel { position: absolute; bottom: 40px; left: 40px; }
        .bar-label { font-size: 10px; color: #666; letter-spacing: 2px; margin-top: 10px; }
        .bar-bg { width: 250px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: 0.1s; }
        #stamina-fill { background: #800; }
        #noise-fill { background: #fff; width: 0%; }

        #hint { 
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 18px; text-shadow: 0 0 10px #000; display: none;
        }

        /* ЭФФЕКТЫ */
        #vignette { 
            position: fixed; width: 100%; height: 100%; 
            box-shadow: inset 0 0 200px #000, inset 0 0 100px #000; 
            pointer-events: none; z-index: 10; 
        }
    </style>
</head>
<body>

    <div id="vignette"></div>

    <div id="ui-root">
        <div id="start-screen" class="screen">
            <h1>GRANNY</h1>
            <div style="color: #333; margin-bottom: 40px;">ENGINE VERSION 5.0.0 (STABLE)</div>
            <button class="btn" onclick="Engine.start()">ИГРАТЬ</button>
            <button class="btn">ОПЦИИ</button>
        </div>

        <div id="pause-screen" class="screen hidden" style="background: rgba(0,0,0,0.8);">
            <h1>ПАУЗА</h1>
            <button class="btn" onclick="Engine.resume()">ПРОДОЛЖИТЬ</button>
            <button class="btn" onclick="location.reload()">ВЫХОД</button>
        </div>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="hint">Нажмите [E]</div>
        <div class="status-panel">
            <div class="bar-label">NOISE LEVEL</div>
            <div class="bar-bg"><div id="noise-fill" class="bar-fill"></div></div>
            <div class="bar-label">STAMINA</div>
            <div class="bar-bg"><div id="stamina-fill" class="bar-fill"></div></div>
            <div id="inventory-ui" style="color: #fff; margin-top: 20px; font-size: 12px; opacity: 0.5;">ИНВЕНТАРЬ ПУСТ</div>
        </div>
    </div>

    <script>
        /**
         * ASSETN CORE GAME ENGINE
         * Спроектировано для стабильной работы FPS хоррора
         */

        const Engine = {
            // Состояние
            isPaused: true,
            isHiding: false,
            keys: {},
            objects: [],
            interactables: [],
            
            // Настройки
            config: {
                speed: 0.12,
                sprintMult: 1.8,
                sens: 0.002,
                gravity: 0.01
            },

            start() {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('hud').style.display = 'block';
                this.isPaused = false;
                initGraphics();
                document.body.requestPointerLock();
                AudioSystem.init();
            },

            resume() {
                this.isPaused = false;
                document.getElementById('pause-screen').classList.add('hidden');
                document.body.requestPointerLock();
            },

            pause() {
                this.isPaused = true;
                document.getElementById('pause-screen').classList.remove('hidden');
            }
        };

        let scene, camera, renderer, clock, player, granny;
        let flashlight, raycaster;
        let stamina = 100, noise = 0, items = [];

        function initGraphics() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.15);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();

            // ОСВЕЩЕНИЕ
            const hemi = new THREE.HemisphereLight(0x111111, 0x000000, 1);
            scene.add(hemi);

            flashlight = new THREE.SpotLight(0xfff1e0, 20, 15, Math.PI/7, 0.5, 2);
            flashlight.castShadow = true;
            scene.add(flashlight);
            scene.add(flashlight.target);

            buildMap();
            spawnGranny();
            setupEvents();
            animate();
        }

        // --- ГЕНЕРАЦИЯ МИРА ---
        function buildMap() {
            // Процедурные текстуры (чтобы не было ошибок загрузки)
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#222';
            ctx.fillRect(0,0,256,256);
            ctx.strokeStyle = '#111';
            for(let i=0; i<4; i++) ctx.strokeRect(i*64, 0, 64, 256);
            
            const wallTex = new THREE.CanvasTexture(canvas);
            wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
            wallTex.repeat.set(2, 1);

            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, color: 0x444444 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1 });

            // Пол
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.receiveShadow = true;
            scene.add(floor);

            // ФУНКЦИЯ СОЗДАНИЯ СТЕНЫ
            const wall = (w, h, d, x, y, z, ry=0) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                m.position.set(x, y + h/2, z);
                m.rotation.y = ry;
                m.castShadow = true;
                m.receiveShadow = true;
                scene.add(m);
                Engine.objects.push(m);
            };

            // ПЛАНИРОВКА ДОМА (1 ЭТАЖ)
            // Периметр
            wall(40, 5, 1, 0, 0, -20); // Сев
            wall(40, 5, 1, 0, 0, 20);  // Юг
            wall(1, 5, 40, -20, 0, 0); // Зап
            wall(1, 5, 40, 20, 0, 0);  // Вост

            // Комнаты
            wall(15, 5, 0.5, -12, 0, 0); // Кухня
            wall(0.5, 5, 15, 0, 0, 12);  // Зал
            
            // Шкаф для пряток
            const closet = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
            closet.position.set(-5, 0, -18);
            closet.userData = { type: 'closet' };
            scene.add(closet);
            Engine.interactables.push(closet);

            // Ключи
            const key = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({color: 0xffd700}));
            key.position.set(15, 0.5, -15);
            key.userData = { type: 'item', name: 'Master Key' };
            scene.add(key);
            Engine.interactables.push(key);
        }

        function spawnGranny() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 2.5), new THREE.MeshStandardMaterial({color: 0x222222}));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({color: 0xdddddd}));
            head.position.y = 1.5;
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color: 0xff0000}));
            eye.position.set(0.1, 1.6, 0.3);
            group.add(body, head, eye);
            group.position.set(10, 0, 10);
            granny = group;
            scene.add(granny);
        }

        // --- ЗВУКОВАЯ СИСТЕМА ---
        const AudioSystem = {
            ctx: null,
            init() { this.ctx = new AudioContext(); },
            playStep() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.frequency.setValueAtTime(60 + Math.random()*20, this.ctx.currentTime);
                g.gain.linearRampToValueAtTime(0.05, this.ctx.currentTime);
                g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                osc.connect(g); g.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            }
        };

        // --- ЛОГИКА И СОБЫТИЯ ---
        function setupEvents() {
            document.addEventListener('keydown', e => Engine.keys[e.code] = true);
            document.addEventListener('keyup', e => Engine.keys[e.code] = false);
            
            document.addEventListener('mousemove', e => {
                if(Engine.isPaused || Engine.isHiding) return;
                camera.rotation.y -= e.movementX * Engine.config.sens;
                camera.rotation.x -= e.movementY * Engine.config.sens;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            });

            document.addEventListener('pointerlockchange', () => {
                if(!document.pointerLockElement) Engine.pause();
            });

            window.addEventListener('keydown', e => {
                if(e.code === 'KeyE') handleInteraction();
            });
        }

        function handleInteraction() {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(Engine.interactables, true);
            if(hits.length > 0) {
                const obj = hits[0].object;
                if(obj.userData.type === 'closet') {
                    Engine.isHiding = !Engine.isHiding;
                    if(Engine.isHiding) {
                        camera.position.set(obj.position.x, 1.7, obj.position.z);
                    }
                }
                if(obj.userData.type === 'item') {
                    items.push(obj.userData.name);
                    document.getElementById('inventory-ui').innerText = "В ИНВЕНТАРЕ: " + items.join(', ');
                    scene.remove(obj);
                }
            }
        }

        function updateAI(dt) {
            const dist = granny.position.distanceTo(camera.position);
            
            // Если игрок спрятался, Гренни его не видит в упор
            if(Engine.isHiding && dist > 3) {
                // Патруль
                granny.translateZ(1 * dt);
                if(Math.random() < 0.01) granny.rotateY(Math.PI * Math.random());
            } else {
                // Погоня
                const speed = (noise > 50 || dist < 10) ? 3 : 1;
                granny.lookAt(camera.position.x, 0, camera.position.z);
                granny.translateZ(speed * dt);
            }

            if(dist < 1.3 && !Engine.isHiding) {
                alert("ТЫ ПОЙМАН!");
                location.reload();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(Engine.isPaused) return;

            const dt = clock.getDelta();

            // ПЕРЕДВИЖЕНИЕ
            if(!Engine.isHiding) {
                let speed = Engine.config.speed;
                if(Engine.keys['ShiftLeft'] && stamina > 0) {
                    speed *= Engine.config.sprintMult;
                    stamina -= 30 * dt;
                    noise = Math.min(100, noise + 2);
                } else {
                    stamina = Math.min(100, stamina + 10 * dt);
                    noise = Math.max(0, noise - 1);
                }

                const dirZ = (Engine.keys['KeyW'] ? 1 : 0) - (Engine.keys['KeyS'] ? 1 : 0);
                const dirX = (Engine.keys['KeyD'] ? 1 : 0) - (Engine.keys['KeyA'] ? 1 : 0);
                
                if(dirZ !== 0 || dirX !== 0) {
                    camera.translateZ(-dirZ * speed);
                    camera.translateX(dirX * speed);
                    if(Math.random() < 0.05) AudioSystem.playStep();
                }
            }

            // ОБНОВЛЕНИЕ HUD
            document.getElementById('stamina-fill').style.width = stamina + '%';
            document.getElementById('noise-fill').style.width = noise + '%';

            // ФОНАРИК
            flashlight.position.copy(camera.position);
            const target = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).add(camera.position);
            flashlight.target.position.copy(target);

            // ПОДСКАЗКА
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(Engine.interactables);
            document.getElementById('hint').style.display = hits.length > 0 ? 'block' : 'none';

            updateAI(dt);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
