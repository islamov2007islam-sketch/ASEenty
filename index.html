<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stealth Hunter</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
body { margin:0; background:#000; }
</style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 1000,
    height: 600,
    physics: { default: 'arcade', arcade: { debug: false }},
    scene: { create, update }
};

new Phaser.Game(config);

let player, bots = [], walls = [];
let keys, ui = {};
let gameState = "menu";
let stamina = 100;
let noiseLevel = 0;
let startTime = 0;

function create() {
    const scene = this;

    // UI
    ui.title = this.add.text(400, 200, "STEALTH HUNTER", {font:"40px Arial", fill:"#fff"});
    ui.start = this.add.text(420, 300, "НАЖМИ SPACE", {font:"20px Arial", fill:"#aaa"});

    keys = this.input.keyboard.addKeys({
        up:'W', down:'S', left:'A', right:'D', shift:'SHIFT', space:'SPACE'
    });
}

function startGame(scene) {
    gameState = "play";

    ui.title.destroy();
    ui.start.destroy();

    player = scene.physics.add.rectangle(100,100,25,25,0x00ffcc);
    player.body.setCollideWorldBounds(true);

    // стены
    for (let i=0;i<8;i++){
        createWall(scene,
            Phaser.Math.Between(100,900),
            Phaser.Math.Between(100,500),
            Phaser.Math.Between(100,200),
            20
        );
    }

    // боты
    for (let i=0;i<3;i++){
        let bot = scene.physics.add.rectangle(
            Phaser.Math.Between(400,900),
            Phaser.Math.Between(200,500),
            25,25,0xff4444
        );
        bot.state="patrol";
        bot.memoryTime=0;
        bots.push(bot);

        scene.physics.add.collider(bot, walls);
    }

    scene.physics.add.collider(player, walls);

    ui.info = scene.add.text(10,10,"",{font:"16px Arial", fill:"#fff"});
    startTime = scene.time.now;
}

function update(time) {
    if (gameState==="menu") {
        if (keys.space.isDown) startGame(this);
        return;
    }

    // ===== PLAYER =====
    let speed = 150;
    if (keys.shift.isDown && stamina>0) {
        speed = 260;
        stamina -= 0.5;
        noiseLevel = 100;
    } else {
        stamina += 0.3;
        noiseLevel *= 0.9;
    }

    stamina = Phaser.Math.Clamp(stamina,0,100);

    player.body.setVelocity(0);

    if (keys.left.isDown) player.body.setVelocityX(-speed);
    if (keys.right.isDown) player.body.setVelocityX(speed);
    if (keys.up.isDown) player.body.setVelocityY(-speed);
    if (keys.down.isDown) player.body.setVelocityY(speed);

    // ===== BOTS AI =====
    bots.forEach(bot => {
        let dx = player.x - bot.x;
        let dy = player.y - bot.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        let see = dist<200 && !blocked(bot,player);
        let hear = dist<noiseLevel;

        if (see) {
            bot.state="chase";
            bot.memoryTime=time;
        } else if (hear) {
            bot.state="search";
            bot.memoryTime=time;
        } else if (time-bot.memoryTime<3000) {
            bot.state="search";
        } else {
            bot.state="patrol";
        }

        if (bot.state==="chase") {
            bot.body.setVelocity(dx*2.5,dy*2.5);
        }
        else if (bot.state==="search") {
            bot.body.setVelocity(dx*1.2,dy*1.2);
        }
        else {
            if (!bot.moveTime || time>bot.moveTime){
                bot.body.setVelocity(
                    Phaser.Math.Between(-80,80),
                    Phaser.Math.Between(-80,80)
                );
                bot.moveTime=time+2000;
            }
        }

        if (dist<25){
            endGame(this,"💀 ПОЙМАН");
        }
    });

    // победа
    if (time-startTime>40000){
        endGame(this,"🏆 ВЫЖИЛ");
    }

    ui.info.setText(
        "Stamina: "+Math.floor(stamina)+
        "\nNoise: "+Math.floor(noiseLevel)+
        "\nTime: "+Math.floor((time-startTime)/1000)
    );
}

function createWall(scene,x,y,w,h){
    let wall=scene.add.rectangle(x,y,w,h,0x555555);
    scene.physics.add.existing(wall,true);
    walls.push(wall);
}

function blocked(bot,player){
    let line=new Phaser.Geom.Line(bot.x,bot.y,player.x,player.y);
    for(let w of walls){
        if(Phaser.Geom.Intersects.LineToRectangle(line,w.getBounds())){
            return true;
        }
    }
    return false;
}

function endGame(scene,textMsg){
    gameState="end";
    scene.add.text(400,300,textMsg,{font:"30px Arial",fill:"#fff"});
    scene.add.text(350,350,"F5 чтобы заново",{font:"20px Arial",fill:"#aaa"});
}
</script>

</body>
</html>
