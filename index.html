<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESTINY: ELITE HORROR</title>
    <style>
        :root { --accent: #ff0000; --bg: #050000; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Georgia', serif; color: #fff; user-select: none; }

        /* ЭЛИТНОЕ МЕНЮ */
        #menu-container {
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; background: radial-gradient(circle, #1a0000 0%, #000 100%);
            transition: opacity 1.5s ease-in-out;
        }
        
        #menu-bg-effect {
            position: absolute; width: 100%; height: 100%; opacity: 0.3;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            animation: pulseBg 8s infinite alternate;
        }

        h1 {
            font-size: 100px; color: var(--accent); text-transform: uppercase;
            letter-spacing: 25px; margin: 0; position: relative;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
            animation: titleGlow 4s infinite ease-in-out;
        }

        .menu-options { position: relative; margin-top: 60px; display: flex; flex-direction: column; gap: 20px; width: 350px; }

        .elite-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 0, 0, 0.3);
            color: #888; padding: 20px; font-size: 18px; letter-spacing: 5px;
            cursor: pointer; position: relative; overflow: hidden; transition: 0.5s;
            text-transform: uppercase; outline: none;
        }

        .elite-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,0,0.2), transparent);
            transition: 0.5s;
        }

        .elite-btn:hover::before { left: 100%; }
        .elite-btn:hover {
            color: #fff; border-color: var(--accent); background: rgba(255, 0, 0, 0.1);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.4); transform: translateY(-5px);
        }

        /* HUD & GAME UI */
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 1px solid rgba(255,0,0,0.5); border-radius: 50%;
            transform: translate(-50%, -50%); display: none; z-index: 500;
        }

        #day-overlay {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: none; align-items: center; justify-content: center;
            z-index: 2000; font-size: 80px; color: var(--accent); letter-spacing: 10px;
        }

        #subtitles {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
            font-size: 24px; color: #ccc; z-index: 600; text-shadow: 2px 2px 10px #000;
        }

        @keyframes titleGlow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 50px #f00; }
        }
        @keyframes pulseBg {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="day-overlay">ДЕНЬ 1</div>

    <div id="menu-container">
        <div id="menu-bg-effect"></div>
        <h1>DESTINY</h1>
        <div class="menu-options">
            <button class="elite-btn" id="start-btn">Принять судьбу</button>
            <button class="elite-btn" id="settings-btn">Настройки</button>
            <button class="elite-btn" id="exit-btn">Выход</button>
        </div>
        <p style="margin-top: 40px; color: #333; letter-spacing: 2px; font-size: 10px;">PREMIUM HORROR ENGINE v2.0</p>
    </div>

    <div id="crosshair"></div>
    <div id="subtitles"></div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        let scene, camera, renderer, clock;
        let gameState = 'MENU';
        let day = 1;
        let moveFwd = false, moveBwd = false, moveL = false, moveR = false;
        let yaw = 0, pitch = 0;
        
        const walls = [];
        let truck, monster;

        // Инициализация при нажатии
        document.getElementById('start-btn').addEventListener('click', () => {
            const menu = document.getElementById('menu-container');
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                startCutscene();
            }, 1500);
        });

        function initCore() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        async function startCutscene() {
            initCore();
            gameState = 'CUTSCENE';
            scene.background = new THREE.Color(0x010101);
            scene.fog = new THREE.Fog(0x010101, 1, 30);

            // Дорога
            const road = new THREE.Mesh(new THREE.PlaneGeometry(200, 20), new THREE.MeshStandardMaterial({color: 0x050505}));
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // Машина
            truck = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 8), new THREE.MeshStandardMaterial({color: 0x110000}));
            body.position.y = 1.5;
            const light = new THREE.PointLight(0xffffff, 20, 30);
            light.position.set(0, 1, 4);
            truck.add(body, light);
            truck.position.set(-80, 0, 0);
            scene.add(truck);

            const ambient = new THREE.AmbientLight(0xffffff, 0.05);
            scene.add(ambient);

            camera.position.set(0, 0.5, -5);
            
            showSub("Где я? Так темно...", 3000);
            
            // Запуск цикла анимации
            animate();
            
            // Движение кат-сцены
            setTimeout(() => {
                let drive = setInterval(() => {
                    truck.position.x += 1.5;
                    camera.position.y = 1.6; // Персонаж встал
                    if(truck.position.x > -5) {
                        clearInterval(drive);
                        triggerHit();
                    }
                }, 16);
            }, 4000);
        }

        function triggerHit() {
            gameState = 'BLACKOUT';
            scene.background = new THREE.Color(0xff0000);
            setTimeout(() => {
                showDay(1);
            }, 100);
        }

        function showDay(n) {
            gameState = 'UI';
            const overlay = document.getElementById('day-overlay');
            overlay.innerText = "ДЕНЬ " + n;
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                setupHouse();
            }, 3000);
        }

        function setupHouse() {
            gameState = 'GAME';
            scene.clear();
            walls.length = 0;
            document.getElementById('crosshair').style.display = 'block';
            document.body.requestPointerLock();

            scene.background = new THREE.Color(0x020000);
            scene.fog = new THREE.FogExp2(0x020000, 0.15);

            // Свет фонарика
            const flash = new THREE.SpotLight(0xffffff, 2, 20, 0.4);
            camera.add(flash);
            camera.add(flash.target);
            flash.target.position.set(0,0,-5);
            scene.add(camera);

            // Стены (Генерация дома)
            const wallMat = new THREE.MeshStandardMaterial({color: 0x221111});
            for(let i=0; i<40; i++) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 4), wallMat);
                wall.position.set(Math.random()*40-20, 2.5, Math.random()*40-20);
                scene.add(wall);
                walls.push(wall);
            }

            camera.position.set(0, 1.6, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(gameState === 'GAME') {
                const speed = 5 * delta;
                if(moveFwd) camera.translateZ(-speed);
                if(moveBwd) camera.translateZ(speed);
                if(moveL) camera.translateX(-speed);
                if(moveR) camera.translateX(speed);
                camera.position.y = 1.6;
                
                // Проверка столкновений
                walls.forEach(w => {
                    if(camera.position.distanceTo(w.position) < 2.5) {
                        camera.position.z += 0.1;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        function showSub(t, time) {
            const s = document.getElementById('subtitles');
            s.innerText = t;
            setTimeout(() => s.innerText = '', time);
        }

        // Управление
        document.addEventListener('keydown', e => {
            if(e.code === 'KeyW') moveFwd = true;
            if(e.code === 'KeyS') moveBwd = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
        });
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') moveFwd = false;
            if(e.code === 'KeyS') moveBwd = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });
        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                camera.rotation.x = pitch;
            }
        });

    </script>
</body>
</html>
