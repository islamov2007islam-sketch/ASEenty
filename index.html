<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DESTINY: REPO EDITION</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
</head>
<body>
    <div id="main-menu" class="overlay">
        <div class="terminal">
            <h1 class="glitch">DESTINY</h1>
            <div class="status">SYSTEM_STATUS: READY</div>
            <button id="btn-start" class="repo-btn">INITIALIZE_GAME</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
        <div class="terminal small">
            <h2>PAUSED</h2>
            <button id="btn-resume" class="repo-btn">CONTINUE</button>
            <button class="repo-btn" onclick="location.reload()">REBOOT</button>
        </div>
    </div>

    <div id="game-hud" class="hidden">
        <div id="crosshair"></div>
        <div id="interaction"></div>
        <div class="stats">
            <div class="label">STAMINA</div>
            <div class="bar"><div id="stamina-fill"></div></div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
