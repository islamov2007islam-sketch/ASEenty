<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STEALTH NIGHT</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
body { margin:0; background:black; }
</style>
</head>
<body>

<script>
// ================= CONFIG =================
const config = {
    type: Phaser.AUTO,
    width: 1100,
    height: 650,
    physics: { default:'arcade', arcade:{debug:false}},
    scene: { create, update }
};

new Phaser.Game(config);

// ================= GLOBAL =================
let player, bots = [], walls = [], doors = [];
let keys, ui = {};
let gameState = "menu";
let stamina = 100;
let fear = 0;
let noise = 0;
let startTime = 0;
let paused = false;

// ================= CREATE =================
function create() {

    keys = this.input.keyboard.addKeys({
        W:'W',A:'A',S:'S',D:'D',
        SHIFT:'SHIFT', SPACE:'SPACE', ESC:'ESC'
    });

    // MENU
    ui.title = this.add.text(400,200,"STEALTH NIGHT",{font:"48px Arial",fill:"#fff"});
    ui.start = this.add.text(420,300,"SPACE чтобы начать",{font:"20px Arial",fill:"#aaa"});
}

// ================= START GAME =================
function startGame(scene) {

    gameState = "play";

    ui.title.destroy();
    ui.start.destroy();

    player = scene.physics.add.rectangle(100,100,25,25,0x00ffff);
    player.body.setCollideWorldBounds(true);

    // ===== MAP =====
    for(let i=0;i<12;i++){
        createWall(scene,
            Phaser.Math.Between(100,1000),
            Phaser.Math.Between(100,600),
            Phaser.Math.Between(120,250),
            20
        );
    }

    // двери
    for(let i=0;i<4;i++){
        let door = scene.add.rectangle(
            Phaser.Math.Between(200,900),
            Phaser.Math.Between(150,550),
            60,10,0x884400
        );
        scene.physics.add.existing(door,true);
        door.open=false;
        doors.push(door);
    }

    scene.physics.add.collider(player,walls);

    // ===== BOTS =====
    for(let i=0;i<5;i++){
        let bot = scene.physics.add.rectangle(
            Phaser.Math.Between(400,1000),
            Phaser.Math.Between(200,600),
            25,25,0xff4444
        );
        bot.state="patrol";
        bot.memory=0;
        bot.speed=Phaser.Math.Between(80,120);
        bots.push(bot);

        scene.physics.add.collider(bot,walls);
    }

    // UI
    ui.info = scene.add.text(10,10,"",{font:"16px Arial",fill:"#fff"});

    startTime = scene.time.now;
}

// ================= UPDATE =================
function update(time) {

    if(gameState==="menu"){
        if(keys.SPACE.isDown) startGame(this);
        return;
    }

    if(keys.ESC.isDown){
        paused = !paused;
    }

    if(paused) return;

    // ===== PLAYER =====
    let speed = 150;

    if(keys.SHIFT.isDown && stamina>0){
        speed = 280;
        stamina -= 0.6;
        noise = 120;
    } else {
        stamina += 0.4;
        noise *= 0.9;
    }

    stamina = Phaser.Math.Clamp(stamina,0,100);

    player.body.setVelocity(0);

    if(keys.A.isDown) player.body.setVelocityX(-speed);
    if(keys.D.isDown) player.body.setVelocityX(speed);
    if(keys.W.isDown) player.body.setVelocityY(-speed);
    if(keys.S.isDown) player.body.setVelocityY(speed);

    // ===== DOORS =====
    doors.forEach(d=>{
        let dist = Phaser.Math.Distance.Between(player.x,player.y,d.x,d.y);
        if(dist<50){
            d.fillColor = 0x00ff00;
            if(keys.SPACE.isDown){
                d.open=!d.open;
                d.visible = !d.open;
                d.body.enable = !d.open;
            }
        } else {
            d.fillColor = 0x884400;
        }
    });

    // ===== AI =====
    bots.forEach(bot=>{
        let dx = player.x - bot.x;
        let dy = player.y - bot.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        let see = dist<220 && !blocked(bot);
        let hear = dist<noise;

        if(see){
            bot.state="chase";
            bot.memory=time;
        }
        else if(hear){
            bot.state="search";
            bot.memory=time;
        }
        else if(time-bot.memory<4000){
            bot.state="search";
        }
        else{
            bot.state="patrol";
        }

        if(bot.state==="chase"){
            bot.body.setVelocity(dx*2.5,dy*2.5);
            fear += 0.3;
        }
        else if(bot.state==="search"){
            bot.body.setVelocity(dx*1.2,dy*1.2);
        }
        else{
            if(!bot.move || time>bot.move){
                bot.body.setVelocity(
                    Phaser.Math.Between(-bot.speed,bot.speed),
                    Phaser.Math.Between(-bot.speed,bot.speed)
                );
                bot.move=time+2000;
            }
        }

        if(dist<20){
            endGame(this,"💀 ПОЙМАН");
        }
    });

    // ===== FEAR EFFECT =====
    fear = Phaser.Math.Clamp(fear,0,100);

    if(fear>50){
        player.fillColor = 0xffaaaa;
    } else {
        player.fillColor = 0x00ffff;
    }

    // ===== WIN =====
    if(time-startTime>60000){
        endGame(this,"🏆 ВЫЖИЛ");
    }

    // ===== UI =====
    ui.info.setText(
        "Time: "+Math.floor((time-startTime)/1000)+
        "\nStamina: "+Math.floor(stamina)+
        "\nFear: "+Math.floor(fear)+
        "\nNoise: "+Math.floor(noise)
    );
}

// ================= HELPERS =================
function createWall(scene,x,y,w,h){
    let wall=scene.add.rectangle(x,y,w,h,0x444444);
    scene.physics.add.existing(wall,true);
    walls.push(wall);
}

function blocked(bot){
    let line=new Phaser.Geom.Line(bot.x,bot.y,player.x,player.y);
    for(let w of walls){
        if(Phaser.Geom.Intersects.LineToRectangle(line,w.getBounds())){
            return true;
        }
    }
    return false;
}

function endGame(scene,msg){
    gameState="end";
    scene.add.text(450,300,msg,{font:"32px Arial",fill:"#fff"});
    scene.add.text(400,350,"F5 чтобы заново",{font:"18px Arial",fill:"#aaa"});
}
</script>

</body>
</html>
