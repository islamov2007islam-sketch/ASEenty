<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DESTINY: THE SHADOW WORLD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: radial-gradient(circle, #200 0%, #000 100%); color: #f00; }
        .btn { background: none; border: 2px solid #f00; color: #f00; padding: 20px 50px; font-size: 24px; cursor: pointer; transition: 0.3s; letter-spacing: 5px; }
        .btn:hover { background: #f00; color: #000; box-shadow: 0 0 50px #f00; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid rgba(255,0,0,0.5); border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; display: none; font-size: 18px; text-shadow: 2px 2px #000; }
        #death { position: absolute; width: 100%; height: 100%; background: #000; display: none; align-items: center; justify-content: center; z-index: 200; color: #f00; font-size: 50px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="font-size: 80px; margin-bottom: 50px;">DESTINY</h1>
        <button class="btn" id="startBtn">ПРИНЯТЬ СУДЬБУ</button>
        <p style="color: #444; margin-top: 20px;">Управление: WASD + Мышь</p>
    </div>

    <div id="hud">ДЕНЬ: <span id="dayNum">1</span> | ФРАГМЕНТЫ: <span id="itemsNum">0</span>/3</div>
    <div id="crosshair"></div>
    <div id="death">ТЫ УМЕР... НО КОШМАР ПРОДОЛЖАЕТСЯ</div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        let scene, camera, renderer, clock, monster, flashlight;
        let moveFwd = false, moveBwd = false, moveL = false, moveR = false;
        let pitch = 0, yaw = 0;
        let day = 1, items = 0;
        let isDead = false;

        const startBtn = document.getElementById('startBtn');
        const ui = document.getElementById('ui');
        const hud = document.getElementById('hud');
        const crosshair = document.getElementById('crosshair');

        startBtn.addEventListener('click', () => {
            ui.style.display = 'none';
            hud.style.display = 'block';
            crosshair.style.display = 'block';
            document.body.requestPointerLock();
            init();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.08);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // --- ОСВЕЩЕНИЕ ---
            const ambient = new THREE.AmbientLight(0x404040, 0.2); // Чтобы хоть что-то было видно
            scene.add(ambient);

            flashlight = new THREE.SpotLight(0xffffff, 5, 25, 0.4, 0.1);
            camera.add(flashlight);
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -5);
            scene.add(camera);

            // --- КАРТА ---
            createMap();
            
            // --- МОНСТР ---
            createMonster();

            // --- ПРЕДМЕТЫ ---
            createItems();

            camera.position.set(0, 1.6, 10);
            clock = new THREE.Clock();
            animate();
        }

        function createMap() {
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x221111 });
            for(let i = 0; i < 60; i++) {
                const h = Math.random() * 5 + 2;
                const wall = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), wallMat);
                wall.position.set(Math.random() * 80 - 40, h/2, Math.random() * 80 - 40);
                scene.add(wall);
            }
        }

        function createMonster() {
            const mGroup = new THREE.Group();
            // Тело
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.1, 3), new THREE.MeshBasicMaterial({color: 0x000000}));
            // Голова
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: 0x000000}));
            head.position.y = 1.8;
            // Глаза
            const eyeGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xff0000});
            const e1 = new THREE.Mesh(eyeGeo, eyeMat); e1.position.set(0.15, 1.9, 0.35);
            const e2 = new THREE.Mesh(eyeGeo, eyeMat); e2.position.set(-0.15, 1.9, 0.35);
            
            mGroup.add(body, head, e1, e2);
            monster = mGroup;
            monster.position.set(20, 0, 20);
            scene.add(monster);
        }

        function createItems() {
            const geo = new THREE.SphereGeometry(0.3);
            const mat = new THREE.MeshBasicMaterial({color: 0x00ff00});
            for(let i=0; i<3; i++) {
                const item = new THREE.Mesh(geo, mat);
                item.position.set(Math.random()*60-30, 1, Math.random()*60-30);
                item.name = "memory_fragment";
                scene.add(item);
            }
        }

        function animate() {
            if(isDead) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Движение игрока
            const speed = 5 * delta;
            if(moveFwd) camera.translateZ(-speed);
            if(moveBwd) camera.translateZ(speed);
            if(moveL) camera.translateX(-speed);
            if(moveR) camera.translateX(speed);
            camera.position.y = 1.6;

            // Логика монстра (ИИ)
            const dist = camera.position.distanceTo(monster.position);
            if(dist < 15) {
                monster.lookAt(camera.position.x, 0, camera.position.z);
                monster.position.lerp(camera.position, 0.015);
                if(dist < 1.5) die();
            } else {
                monster.position.y = Math.sin(Date.now() * 0.002) * 0.5 + 1.5;
            }

            // Сбор предметов
            scene.children.forEach(obj => {
                if(obj.name === "memory_fragment" && camera.position.distanceTo(obj.position) < 1.5) {
                    scene.remove(obj);
                    items++;
                    document.getElementById('itemsNum').innerText = items;
                    if(items >= 3) alert("ТЫ СОБРАЛ ВСЕ ФРАГМЕНТЫ! НАЙДИ ВЫХОД!");
                }
            });

            renderer.render(scene, camera);
        }

        function die() {
            isDead = true;
            document.exitPointerLock();
            document.getElementById('death').style.display = 'flex';
            setTimeout(() => {
                location.reload(); // Начинаем новый день (перезагрузка)
            }, 3000);
        }

        // --- УПРАВЛЕНИЕ МЫШЬЮ ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveFwd = true;
            if(e.code === 'KeyS') moveBwd = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveFwd = false;
            if(e.code === 'KeyS') moveBwd = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });

    </script>
</body>
</html>
