<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESTINY: THE CELLAR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="video-container" class="fullscreen hidden">
        <video id="intro-video" src="assets/intro.mp4" playsinline></video>
    </div>

    <div id="screamer-overlay" class="fullscreen hidden">
        <img id="screamer-img" src="assets/monster.png" alt="Monster">
        <audio id="scream-sound" src="assets/scream.mp3"></audio>
    </div>

    <div id="main-menu" class="fullscreen">
        <div class="menu-content">
            <h1 class="glitch" data-text="DESTINY">DESTINY</h1>
            <p class="subtitle">SYSTEM REQUIRED: WEBGL 2.0</p>
            <div class="menu-buttons">
                <button id="btn-start" class="repo-btn">ПРИНЯТЬ СУДЬБУ</button>
                <button id="btn-settings" class="repo-btn">НАСТРОЙКИ</button>
                <button class="repo-btn" onclick="window.close()">ВЫХОД</button>
            </div>
        </div>
    </div>

    <div id="game-hud" class="fullscreen hidden">
        <div id="crosshair"></div>
        
        <div id="interaction-prompt"></div>

        <div id="status-panel">
            <div class="stat-block">
                <div class="stat-label">SYSTEM.STAMINA</div>
                <div class="bar-bg"><div id="stamina-bar"></div></div>
            </div>
            <div class="stat-block">
                <div class="stat-label">CONDITION: NORMAL</div>
            </div>
        </div>

        <div id="inventory-panel">
            <div class="stat-label" style="text-align: right;">INVENTORY</div>
            <ul id="inventory-list">
                <li style="color: #555;">ПУСТО</li>
            </ul>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
