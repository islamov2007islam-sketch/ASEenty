<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESTINY: THE ENDLESS ROAD</title>
    <style>
        :root { --red: #660000; --bright-red: #ff0000; --panel: rgba(10, 0, 0, 0.9); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; user-select: none; }
        
        /* ЭФФЕКТЫ ЭКРАНА */
        #vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px #000; pointer-events: none; z-index: 50; }
        #noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.04; pointer-events: none; z-index: 51; background: url('https://media.giphy.com/media/oEI9uWUicfLlC/giphy.gif'); }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 2000; }

        /* ГЛАВНОЕ МЕНЮ */
        .ui-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: radial-gradient(circle, #200 0%, #000 100%); transition: 1s; }
        h1 { font-size: 80px; letter-spacing: 20px; color: var(--red); text-shadow: 0 0 20px #000; margin: 0; text-transform: uppercase; animation: glow 4s infinite; }
        .menu-btns { margin-top: 50px; display: flex; flex-direction: column; gap: 15px; width: 300px; }
        .btn { background: var(--panel); border: 1px solid var(--red); color: #888; padding: 15px; font-size: 18px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 3px; }
        .btn:hover { background: var(--red); color: #fff; box-shadow: 0 0 30px var(--bright-red); transform: scale(1.05); }

        /* МАГАЗИН */
        #shop-ui { display: none; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; width: 100%; }
        .coin-text { color: #ffd700; font-size: 20px; margin-bottom: 20px; }

        /* HUD */
        #hud { position: fixed; bottom: 30px; left: 30px; z-index: 100; display: none; }
        .stamina-bar { width: 200px; height: 10px; border: 1px solid #444; background: #111; position: relative; }
        #stamina-fill { width: 100%; height: 100%; background: #900; transition: 0.1s; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); display: none; }

        /* ЭКРАН СМЕРТИ */
        #death-screen { display: none; background: #000; z-index: 3000; }
        #death-text { font-size: 40px; color: var(--bright-red); text-align: center; }

        @keyframes glow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; text-shadow: 0 0 40px #f00; } }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div id="noise"></div>
    <div id="flash"></div>
    <div id="crosshair"></div>

    <div id="main-menu" class="ui-screen">
        <h1>DESTINY</h1>
        <div class="coin-text">МОНЕТЫ: <span id="menu-coins">0</span></div>
        <div class="menu-btns">
            <button class="btn" id="play-btn">ИГРАТЬ</button>
            <button class="btn" onclick="openShop()">МАГАЗИН</button>
            <button class="btn" onclick="alert('Выхода нет.')">ВЫХОД</button>
        </div>
    </div>

    <div id="shop-ui" class="ui-screen">
        <h2 style="color:var(--red)">УЛУЧШЕНИЯ</h2>
        <div class="coin-text">БАЛАНС: <span id="shop-coins">0</span></div>
        <div class="menu-btns" style="width: 450px;">
            <div class="shop-item">
                <span>ЯРКИЙ ФОНАРЬ (50)</span>
                <button class="btn" style="padding:5px 15px;" onclick="buy('light')">КУПИТЬ</button>
            </div>
            <div class="shop-item">
                <span>БЕГ +35% (80)</span>
                <button class="btn" style="padding:5px 15px;" onclick="buy('speed')">КУПИТЬ</button>
            </div>
            <button class="btn" onclick="closeShop()">НАЗАД</button>
        </div>
    </div>

    <div id="hud">
        <div style="font-size: 12px; margin-bottom: 5px;">ВЫНОСЛИВОСТЬ</div>
        <div class="stamina-bar"><div id="stamina-fill"></div></div>
        <div id="items-info" style="margin-top:10px;">МОНЕТЫ: <span id="game-coins">0</span></div>
    </div>

    <div id="death-screen" class="ui-screen">
        <div id="death-text">ВЫ СТАЛИ ЧАСТЬЮ ДОРОГИ</div>
        <button class="btn" style="margin-top:40px;" onclick="location.reload()">ВОСКРЕСНУТЬ</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        // Состояние игрока (Экономика)
        let playerStats = {
            coins: parseInt(localStorage.getItem('coins')) || 0,
            speedBoost: parseFloat(localStorage.getItem('speedBoost')) || 1.0,
            lightPower: parseFloat(localStorage.getItem('lightPower')) || 1.5,
            staminaMax: 100
        };

        let scene, camera, renderer, clock, monster, truck;
        let isGameRunning = false;
        let stamina = 100;
        let yaw = 0, pitch = 0;
        let moveFwd = false, moveBwd = false, moveL = false, moveR = false, isRunning = false;
        
        const walls = [];

        // Инициализация
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            updateUI();
        }

        // Катсцена
        async function runCutscene() {
            document.getElementById('main-menu').style.opacity = '0';
            setTimeout(() => document.getElementById('main-menu').style.display = 'none', 1000);
            
            initScene();
            
            // Окружение для катсцены
            const road = new THREE.Mesh(new THREE.PlaneGeometry(100, 10), new THREE.MeshStandardMaterial({color: 0x111111}));
            road.rotation.x = -Math.PI/2;
            scene.add(road);

            // Грузовик монстра
            truck = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 7), new THREE.MeshStandardMaterial({color: 0x050000}));
            const monsterHead = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xff0000}));
            monsterHead.position.set(1, 1.5, 2);
            const headlights = new THREE.SpotLight(0xffffff, 50, 40, 0.5);
            headlights.position.set(0, 1.5, 3.5);
            truck.add(body, monsterHead, headlights, headlights.target);
            truck.position.set(-60, 0, 0);
            scene.add(truck);

            camera.position.set(2, 0.1, 8); // Игрок лежит под деревом
            camera.lookAt(0, 2, 0);

            // Анимация подъема
            let startTime = Date.now();
            const anim = setInterval(() => {
                let elapsed = Date.now() - startTime;
                if(elapsed < 3000) {
                    camera.position.y = THREE.MathUtils.lerp(camera.position.y, 1.7, 0.01);
                } else if(elapsed > 4000 && elapsed < 8000) {
                    truck.position.x += 0.8; // Грузовик летит
                    if(truck.position.x > -5) {
                        // СКРИМЕР
                        document.getElementById('flash').style.opacity = '1';
                        clearInterval(anim);
                        startMainGame();
                    }
                }
            }, 16);

            render();
        }

        // Геймплей
        function startMainGame() {
            setTimeout(() => {
                document.getElementById('flash').style.opacity = '0';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('crosshair').style.display = 'block';
                isGameRunning = true;
                
                scene.clear();
                buildLevel();
                camera.position.set(0, 1.7, 40);
                document.body.requestPointerLock();
            }, 1000);
        }

        function buildLevel() {
            scene.fog = new THREE.FogExp2(0x020202, 0.15);
            
            // Фонарик
            const light = new THREE.SpotLight(0xffffff, playerStats.lightPower, 25, 0.4, 0.5);
            camera.add(light);
            camera.add(light.target);
            light.target.position.set(0,0,-5);
            scene.add(camera);

            // Пол
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x050505}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // Стены/Здания (Случайная генерация)
            for(let i=0; i<40; i++) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(5, 8, 5), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
                w.position.set(Math.random()*100-50, 4, Math.random()*100-50);
                scene.add(w);
                walls.push(w);
            }

            // Монстр AI
            const mGeo = new THREE.CylinderGeometry(0.3, 0.3, 2.5);
            const mMat = new THREE.MeshBasicMaterial({color: 0x000000});
            monster = new THREE.Group();
            monster.add(new THREE.Mesh(mGeo, mMat));
            const eyes = new THREE.PointLight(0xff0000, 2, 5);
            eyes.position.y = 1;
            monster.add(eyes);
            monster.position.set(20, 1.25, 20);
            scene.add(monster);
        }

        function render() {
            if(!renderer) return;
            requestAnimationFrame(render);
            const delta = clock.getDelta();

            if(isGameRunning) {
                // Движение
                let currentSpeed = 5 * playerStats.speedBoost;
                if(isRunning && stamina > 0) {
                    currentSpeed *= 1.6;
                    stamina -= 30 * delta;
                } else {
                    stamina = Math.min(100, stamina + 15 * delta);
                }
                document.getElementById('stamina-fill').style.width = stamina + '%';

                const dir = new THREE.Vector3();
                if(moveFwd) dir.z -= 1;
                if(moveBwd) dir.z += 1;
                if(moveL) dir.x -= 1;
                if(moveR) dir.x += 1;
                dir.normalize().applyQuaternion(camera.quaternion);
                
                camera.position.addScaledVector(dir, currentSpeed * delta);
                camera.position.y = 1.7 + Math.sin(Date.now()*0.01) * (isRunning ? 0.05 : 0.02);

                // AI Монстра
                const dist = camera.position.distanceTo(monster.position);
                if(dist < 20) { // Слышит/видит
                    monster.lookAt(camera.position.x, 1.25, camera.position.z);
                    monster.position.lerp(camera.position, 0.012);
                    if(dist < 2) gameOver();
                }

                // Случайные события
                if(Math.random() < 0.001) { // Мигание света
                    camera.children[0].intensity = 0;
                    setTimeout(() => camera.children[0].intensity = playerStats.lightPower, 100);
                }
            }

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameRunning = false;
            document.exitPointerLock();
            document.getElementById('death-screen').style.display = 'flex';
            // Выплата за выживание
            playerStats.coins += 10;
            save();
        }

        // Системные функции
        function save() {
            localStorage.setItem('coins', playerStats.coins);
            localStorage.setItem('speedBoost', playerStats.speedBoost);
            localStorage.setItem('lightPower', playerStats.lightPower);
        }

        function updateUI() {
            document.getElementById('menu-coins').innerText = playerStats.coins;
            document.getElementById('shop-coins').innerText = playerStats.coins;
            document.getElementById('game-coins').innerText = playerStats.coins;
        }

        window.buy = (type) => {
            if(type === 'light' && playerStats.coins >= 50) {
                playerStats.coins -= 50;
                playerStats.lightPower = 3.5;
                alert('Фонарь улучшен!');
            }
            if(type === 'speed' && playerStats.coins >= 80) {
                playerStats.coins -= 80;
                playerStats.speedBoost = 1.35;
                alert('Скорость увеличена!');
            }
            save(); updateUI();
        };

        window.openShop = () => { document.getElementById('shop-ui').style.display = 'flex'; updateUI(); };
        window.closeShop = () => { document.getElementById('shop-ui').style.display = 'none'; };

        document.getElementById('play-btn').addEventListener('click', runCutscene);

        // Управление
        document.addEventListener('keydown', e => {
            if(e.code === 'KeyW') moveFwd = true;
            if(e.code === 'KeyS') moveBwd = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
            if(e.shiftKey) isRunning = true;
        });
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') moveFwd = false;
            if(e.code === 'KeyS') moveBwd = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
            if(!e.shiftKey) isRunning = false;
        });
        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        updateUI();
    </script>
</body>
</html>
